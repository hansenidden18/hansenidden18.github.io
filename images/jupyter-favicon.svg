<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="jup" cx="40%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#f5deb3"/>
      <stop offset="100%" style="stop-color:#c4956a"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>
  <!-- Planet body -->
  <circle cx="32" cy="32" r="28" fill="url(#jup)"/>
  <!-- Cloud bands -->
  <g clip-path="url(#circle)">
    <rect x="0" y="8" width="64" height="5" fill="#e8c99b" opacity="0.7" rx="2"/>
    <rect x="0" y="16" width="64" height="4" fill="#d4a574" opacity="0.6" rx="2"/>
    <rect x="0" y="22" width="64" height="6" fill="#c4956a" opacity="0.5" rx="2"/>
    <rect x="0" y="30" width="64" height="5" fill="#b8845e" opacity="0.6" rx="2"/>
    <rect x="0" y="38" width="64" height="4" fill="#d4a574" opacity="0.5" rx="2"/>
    <rect x="0" y="44" width="64" height="6" fill="#e8c99b" opacity="0.6" rx="2"/>
    <rect x="0" y="52" width="64" height="4" fill="#c4956a" opacity="0.5" rx="2"/>
    <!-- Great Red Spot -->
    <ellipse cx="40" cy="34" rx="7" ry="4.5" fill="#c06040" opacity="0.7"/>
    <ellipse cx="40" cy="34" rx="5" ry="3" fill="#d4734f" opacity="0.5"/>
  </g>
  <!-- Subtle sphere shading -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#b8845e" stroke-width="0.5" opacity="0.3"/>
  <circle cx="26" cy="24" r="20" fill="white" opacity="0.08"/>
</svg>
