{% include base_path %}

<!-- start custom head snippets -->

<!-- Jupyter Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/jupyter-favicon.svg">
<link rel="shortcut icon" href="{{ base_path }}/images/jupyter-favicon.svg">
<link rel="apple-touch-icon" href="{{ base_path }}/images/jupyter-favicon.svg">
<meta name="msapplication-TileColor" content="#c4956a">
<meta name="theme-color" content="#ffffff">

<!-- Google Fonts: Inter for a clean, modern look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/custom.css"/>

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- end custom head snippets -->
